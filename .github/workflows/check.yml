# Per-commit build check: the mod (repo root) and the Gradle plugin (gradle-plugin/),
# uploading both sets of jars as CI artifacts.
name: Build Check

on: [ pull_request, push ]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build mod
        run: |
          chmod +x ./gradlew
          ./gradlew build
      - name: Build gradle plugin
        working-directory: gradle-plugin
        run: |
          chmod +x ./gradlew
          ./gradlew build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-libs
          path: |
            build/libs/**/*
            gradle-plugin/build/libs/**/*
